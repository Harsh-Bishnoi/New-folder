<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="//code.jquery.com/jquery-2.2.1.min.js"></script>
</head>
<style>
    body {
        background: #000;
    }

    .footer-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 24px;
        overflow: visible !important;
    }

    /* Main Links */
    .footer-nav a,
    .dropdown-trigger {
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        font-weight: 400;
        line-height: 160%;
        cursor: pointer;
        position: relative;
        transition: all .3s ease;
    }

    /* Active State */
    .footer-nav a.active,
    .dropdown-trigger.active {
        font-weight: 500;
    }

    .footer-nav a.active::after,
    .dropdown-trigger.active::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -2px;
        width: 100%;
        height: 1px;
        background: #fff;
    }

    /* Dropdown */
    .footer-dropdown {
        position: relative;
    }

    .dropdown-trigger {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .dropdown-trigger svg {
        transition: transform .3s ease;
    }

    .footer-dropdown:hover .dropdown-trigger svg {
        transform: rotate(180deg);
    }

    /* ===================== */
    /* COMPACT DROPDOWN UI */
    /* ===================== */

    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);

        display: flex;
        align-items: center;
        justify-content: center;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);

        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;

        padding: 10px 12px;

        opacity: 0;
        visibility: hidden;
        pointer-events: none;

        transition: all .25s ease;
        z-index: 99999;

        white-space: nowrap;
    }

    .footer-dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
    }

    /* Dropdown Links */
    .dropdown-menu a {
        display: flex;
        align-items: center;
        justify-content: center;

        color: #F9DEE2;
        text-decoration: none;

        font-size: 16px;
        font-weight: 400;
        line-height: 1.2;

        padding: 0 22px;
        position: relative;
    }

    .dropdown-menu a:hover {
        opacity: .8;
    }

    .dropdown-menu a.active {
        font-weight: 500;
    }

    /* Divider */
    .dropdown-menu a:not(:last-child)::after {
        content: "";
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);

        width: 1px;
        height: 28px;

        background: rgba(255, 255, 255, .25);
    }

    /* Mobile */
    @media (max-width: 991px) {
        .dropdown-menu {
            flex-direction: column;
            min-width: 180px;
            padding: 12px;
        }

        .dropdown-menu a {
            padding: 8px 0;
        }

        .dropdown-menu a:not(:last-child)::after {
            display: none;
        }
    }

    /* Squarespace Fix */
    footer,
    .footer,
    .footer-inner,
    .Footer,
    .sqs-footer-content,
    section[data-section-id] {
        overflow: visible !important;
    }
</style>

<body>


    <div class="footer-nav">

        <a href="/">Home</a>

        <a href="/about-me">About Me</a>

        <!-- WOODWINDS -->
        <div class="footer-dropdown">
            <div class="dropdown-trigger">
                Woodwinds
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M7 10L12 15L17 10" stroke="#F9DEE2" stroke-width="1.3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>

            <div class="dropdown-menu">
                <a href="/flute">Flute</a>
                <a href="/clarinet">Clarinet</a>
                <a href="/saxophone">Saxophone</a>
            </div>
        </div>

        <!-- BRASS -->
        <div class="footer-dropdown">
            <div class="dropdown-trigger">
                Brass
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M7 10L12 15L17 10" stroke="#F9DEE2" stroke-width="1.3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>

            <div class="dropdown-menu">
                <a href="/trumpet">Trumpet</a>
            </div>
        </div>

        <a href="/my-resume">Resume</a>

        <a href="/contact-us">Contact</a>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentPath = window.location.pathname.replace(/\/$/, "") || "/";

            document.querySelectorAll(".footer-nav a").forEach(link => {
                const href = link.getAttribute("href");

                // Home active on "/" and "/home"
                if (
                    (currentPath === "/" || currentPath === "/home") &&
                    (href === "/" || href === "/home")
                ) {
                    link.classList.add("active");
                }

                // Other pages
                else if (
                    href !== "/" &&
                    href !== "/home" &&
                    currentPath === href.replace(/\/$/, "")
                ) {
                    link.classList.add("active");
                }
            });
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentPath = window.location.pathname.replace(/\/$/, "") || "/";

            document.querySelectorAll(".footer-dropdown").forEach(dropdown => {
                const trigger = dropdown.querySelector(".dropdown-trigger");
                const links = dropdown.querySelectorAll(".dropdown-menu a");

                links.forEach(link => {
                    const href = link.getAttribute("href").replace(/\/$/, "");

                    if (currentPath === href) {
                        link.classList.add("active");
                        trigger.classList.add("active");
                    }
                });
            });
        });
    </script>
</body>

</html>
